# 공유 인프라 (Shared Infrastructure)
# 도메인 간 공통으로 사용되는 인프라/스택 컴포넌트의 인스턴스.
# 각 도메인 abox 파일에서 `deployed_in` 또는 `depends_on` 관계로 이 entity들을 참조한다.
#
# 규칙 (tbox.yaml axiom 참조):
# - infra entity는 wiki_doc, repo, package 필드를 갖지 않는다.
# - id는 도메인 전체에서 유일해야 한다.

entities:
  - id: mariadb
    name: MariaDB
    type: infra
    summary: |
      ALLSP 표준 RDB. 모든 회계/예산 트랜잭션 데이터(EXP_*, ACC_*, BDG_*)의 1차 영속 저장소.
      현장은 Oracle/MSSQL 환경도 운영되므로 매퍼는 3개 방언을 모두 지원한다.

  - id: oracle
    name: Oracle 11g+
    type: infra
    summary: |
      대형 사업장에서 채택되는 RDB. ROWNUM 기반 페이징, SYSDATE / NVL / FROM DUAL 등
      방언이 MariaDB와 다르며, MyBatis 매퍼가 dialect별로 분기된다.

  - id: mssql
    name: MSSQL 2014+
    type: infra
    summary: |
      일부 공공/사학 사업장에서 채택되는 RDB. dbo. 접두사 + GETDATE / ISNULL / TOP·OFFSET
      방언이 별도이며, 커스텀 함수(FN_*)도 dbo. 접두사로 호출된다.

  - id: tomcat
    name: Apache Tomcat
    type: infra
    summary: |
      WAS. Spring 기반 ALLSP_STD를 호스팅한다. 단일 인스턴스 또는 L4 로드밸런서 뒤
      다중 인스턴스로 운영.

  - id: spring
    name: Spring Framework
    type: infra
    summary: |
      백엔드 컨테이너. @Controller / @Service / @Repository 레이어, ExceptionResolver를
      통한 AJAX 에러 자동 변환, DefaultVO 기반 세션/IP/프로그램 자동 주입을 담당한다.

  - id: mybatis
    name: MyBatis
    type: infra
    summary: |
      SQL 매핑. sqlmap/maria, sqlmap/oracle, sqlmap/mssql 세 방언이 병렬로 존재하며,
      DefaultDAO가 list/insert/update/selectByPk 등 공통 메서드를 제공한다.

  - id: jsp
    name: JSP
    type: infra
    summary: |
      화면 템플릿. nimsHeader / nimsMain 표준 골격 + jsLib.jsp 공통 스크립트.
      ${} EL이 ES6 템플릿 리터럴과 충돌하므로 JSP 안 JS는 문자열 연결 + function 선언문 규칙.

  - id: dhtmlx
    name: DHTMLX Grid 5
    type: infra
    summary: |
      ALLSP 표준 그리드 컴포넌트. app_dhtmlxApi.js 커스텀 확장
      (reGetCellRowIdData, reGridBind, reAttachEvent 등)을 통해 사용한다.
