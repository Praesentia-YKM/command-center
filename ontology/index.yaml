# Ontology Index
# 도메인 목록과 비즈니스 위계. 이 파일이 탐색의 진입점.
# Claude는 매 요청 시 이 파일을 먼저 읽고, 관련 도메인 파일로 이동한다.

domains:
  - id: acc-exp
    path: 회계/지출
    file: abox/acc-exp.yaml
    summary: 지출 품의 → 원인행위 → 결의 → 지급명령 → 전표 생성까지의 지출 라이프사이클
    repos:
      - ALLSP_STD
    infra:
      - mariadb
      - oracle
      - mssql
      - tomcat
      - spring
      - mybatis
      - jsp
      - dhtmlx

  - id: bdg
    path: 회계/예산
    file: abox/bdg.yaml
    summary: 회계연도별 예산차수, 정책/단위/세부사업 위계, 세출/세입 과목체계, 요구→조정→확정 편성 흐름과 잔액 통제
    repos:
      - ALLSP_STD
    infra:
      - mariadb
      - oracle
      - mssql
      - tomcat
      - spring
      - mybatis
      - jsp
      - dhtmlx

cross_domain: abox/cross-domain.yaml
shared_infra: abox/infra.yaml
