# 도메인 간 관계 (Cross-Domain Relations)
# 둘 이상의 도메인에 걸친 relation만 이 파일에 정의한다.
# 단일 도메인 내에서 완결되는 relation은 각 도메인 abox 파일에 둔다.
#
# from/to 형식: "{도메인id}/{entity-id}"
# 예: from: acc-exp/exp-cst-process, to: bdg/bdg-ebdg-cpl
#
# 도메인 abox가 추가되면 이 파일도 함께 갱신한다.
# tbox.yaml의 relation_types와 domain_range axiom을 준수한다.

relations:
  # 지출 → 예산편성: 잔액 검증 + 차감
  - from: acc-exp/exp-cst-process
    to: bdg/bdg-ebdg-cpl
    type: references
    note: |
      지출품의 시 BDG_EBDG_CPL의 편성잔액을 검증하고 차감한다.
      통제 단위는 다중과목 화면 기준 공급가액(SUPP). 잔액 초과 시 진행 차단.

  # 지출 → 지출과목: 과목코드 참조
  - from: acc-exp/exp-cst-process
    to: bdg/bdg-ebdg-sbj
    type: references
    note: |
      EXP_CST_SBJ.EXP_SBJ 컬럼이 BDG_EBDG_SBJ의 지출과목코드를 직접 참조한다.
      목그룹(H)/목(M)/세목(S) 3계층 중 세목 레벨에서 참조.

  # 지출 → 세부사업: 세부사업 참조
  - from: acc-exp/exp-cst-process
    to: bdg/bdg-dtl-biz
    type: references
    note: |
      EXP_CST_SBJ.DTL_BIZ_CD 컬럼이 BDG_DTL_BIZ를 직접 참조한다.
      정책/단위사업은 owns 체인으로 도달.
